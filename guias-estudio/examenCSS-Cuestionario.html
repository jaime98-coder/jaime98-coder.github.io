<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen CSS</title>
    <style>
        /* ESTILOS VISUALES */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2563eb;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
        }

        /* TARJETA DE PREGUNTA */
        .question-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }

        .question-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #111827;
        }

        /* OPCIONES (BOTONES) */
        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option-btn {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            padding: 12px 15px;
            text-align: left;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            color: #374151;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e5e7eb;
            border-color: #d1d5db;
        }

        /* ESTADOS DE RESPUESTA */
        .option-btn.correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.7;
        }

        /* CAJA DE EXPLICACIÓN */
        .explanation-box {
            margin-top: 15px;
            padding: 15px;
            background-color: #eff6ff;
            border-left: 4px solid #3b82f6;
            border-radius: 4px;
            display: none; /* Oculto por defecto */
            animation: fadeIn 0.5s;
        }

        .explanation-text {
            font-size: 0.95rem;
            color: #1e40af;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <h1>📝 Cuestionario de Repaso CSS</h1>
    <p class="subtitle">Responde las 60 preguntas. Haz clic en una opción para corregir.</p>

    <div id="quiz-container">
        </div>

    <script>
        // --- TUS DATOS DEL CÓDIGO REACT ---
        const questions = [
            { id: 1, question: "¿Dónde se recomienda colocar la etiqueta <link> para incluir un archivo CSS externo?", options: [ "Al final del <body>", "En el <head> del documento", "Después del primer <div>", "En un comentario HTML" ], correct: 1, explanation: "La etiqueta <link> para CSS se debe incluir en el <head> del documento HTML." },
            { id: 2, question: "¿Cuál es el formato correcto para el atributo href de un archivo CSS en un directorio llamado 'css'?", options: [ "href='estilo.css'", "href='css/estilo.css'", "href='/estilo.css/css'", "href='../estilo.css'" ], correct: 1, explanation: "El archivo CSS se referencia con la ruta relativa: href='css/estilo.css' si está en un subdirectorio 'css'." },
            { id: 3, question: "Al separar múltiples instrucciones CSS en el atributo style inline, ¿qué carácter se utiliza?", options: [ "Coma (,)", "Punto y coma (;)", "Dos puntos (:)", "Barra vertical (|)" ], correct: 1, explanation: "Las diferentes instrucciones CSS en el atributo style se separan con punto y coma (;)." },
            { id: 4, question: "En un selector de clase en CSS, ¿qué carácter debe preceder al nombre?", options: [ "Asterisco (*)", "Almohadilla (#)", "Punto (.)", "Arroba (@)" ], correct: 2, explanation: "Los selectores de clase deben ir precedidos de un punto (.). En HTML el atributo class no lleva punto." },
            { id: 5, question: "¿Cuántas veces se puede usar un mismo ID en un documento HTML?", options: [ "Las veces que sea necesario", "Máximo 5 veces", "Solo una vez, los ID son únicos", "Depende del navegador" ], correct: 2, explanation: "Los ID son únicos y no se pueden repetir en el mismo documento HTML." },
            { id: 6, question: "Si defines un color como #FF0033, ¿cómo puedes abreviarlo?", options: [ "#F03", "#F3", "#FF03", "No se puede abreviar" ], correct: 0, explanation: "Cuando las parejas hexadecimales son idénticas (#FF0033), se puede abreviar (#F03)." },
            { id: 7, question: "¿Qué formato de color está enfocado principalmente a impresión?", options: [ "RGB", "RGBA", "CMYK", "Hexadecimal" ], correct: 2, explanation: "CMYK (Cian, Magenta, Amarillo, Negro) está enfocado a impresión. En digital es mejor usar RGB." },
            { id: 8, question: "¿Qué valor de text-align sirve para ajustar el texto a ambos márgenes?", options: [ "both", "justify", "full", "stretch" ], correct: 1, explanation: "text-align: justify ajusta el texto para que quede alineado en ambos márgenes." },
            { id: 9, question: "Para colocar una línea encima del texto, ¿qué valor de text-decoration usarías?", options: [ "top-line", "overline", "upper-line", "line-top" ], correct: 1, explanation: "text-decoration: overline coloca una línea encima del texto." },
            { id: 10, question: "¿Qué valor de text-decoration crea un texto tachado?", options: [ "strikethrough", "crossed", "line-through", "deleted" ], correct: 2, explanation: "text-decoration: line-through crea un efecto de texto tachado." },
            { id: 11, question: "Para convertir todo el texto a minúsculas, ¿qué propiedad y valor usas?", options: [ "text-case: lower", "font-transform: lowercase", "text-transform: lowercase", "case-style: min" ], correct: 2, explanation: "text-transform: lowercase convierte todo el texto a minúsculas." },
            { id: 12, question: "¿Qué unidad de medida es absoluta y se expresa en puntos?", options: [ "em", "pt", "%", "vh" ], correct: 1, explanation: "pt (puntos) es una unidad absoluta de medida. px también es absoluta." },
            { id: 13, question: "En font-family, si una fuente genérica se coloca al final de la lista, ¿cuál es su propósito?", options: [ "Es decorativa", "Actúa como respaldo si no se encuentra ninguna de las anteriores", "Define el color de la fuente", "No tiene propósito real" ], correct: 1, explanation: "Las fuentes genéricas (serif, sans-serif, monospace) se ponen al final como respaldo." },
            { id: 14, question: "¿Qué valor de font-style aplica cursiva al texto?", options: [ "cursive", "italic", "oblique", "slanted" ], correct: 1, explanation: "font-style: italic aplica cursiva al texto." },
            { id: 15, question: "Para quitar la negrita de un texto, ¿qué valor de font-weight utilizas?", options: [ "light", "regular", "normal", "thin" ], correct: 2, explanation: "font-weight: normal elimina la negrita del texto." },
            { id: 16, question: "En text-shadow, si el primer valor es negativo, ¿hacia dónde se desplaza la sombra horizontalmente?", options: [ "Hacia la derecha", "Hacia abajo", "Hacia la izquierda", "No se desplaza" ], correct: 2, explanation: "Un valor negativo en el desplazamiento horizontal mueve la sombra hacia la izquierda." },
            { id: 17, question: "¿Qué propiedad CSS usarías para hacer que una sección ocupe exactamente toda la altura de la ventana visible?", options: [ "height: 100%", "height: 100vh", "height: full", "height: screen" ], correct: 1, explanation: "height: 100vh (Viewport Height) hace que el elemento ocupe el 100% de la altura visible de la pantalla." },
            { id: 18, question: "Por defecto, ¿cómo se comportan los elementos de bloque respecto al ancho?", options: [ "Ocupan solo el ancho de su contenido", "Ocupan todo el ancho disponible", "Ocupan el 50% del ancho", "No tienen ancho definido" ], correct: 1, explanation: "Los elementos de bloque ocupan todo el ancho disponible por defecto." },
            { id: 19, question: "Si defines display: inline en un <div>, ¿podrás cambiar su width y height?", options: [ "Sí, siempre", "Solo el width", "Solo el height", "No, los elementos inline no aceptan width/height" ], correct: 3, explanation: "Los elementos inline no aceptan cambios de width y height como los bloques." },
            { id: 20, question: "¿Para qué sirve la propiedad max-width en elementos de bloque?", options: [ "Para establecer el ancho mínimo", "Para evitar que el elemento crezca indefinidamente", "Para centrar el elemento", "Para añadir padding automático" ], correct: 1, explanation: "max-width establece un tamaño máximo para evitar que el elemento crezca indefinidamente." },
            { id: 21, question: "En la propiedad border genérica, ¿cuál es el orden correcto de los valores?", options: [ "Color, Estilo, Medida", "Estilo, Color, Medida", "Medida, Estilo, Color", "Medida, Color, Estilo" ], correct: 2, explanation: "El orden correcto es: Medida, Estilo, Color. Ejemplo: border: 2px solid red;" },
            { id: 22, question: "¿Qué valor de border-style crea una línea doble?", options: [ "dual", "double", "twin", "doubled" ], correct: 1, explanation: "border-style: double crea un borde con línea doble." },
            { id: 23, question: "En box-shadow, ¿cuántos valores se pueden especificar y qué representa el cuarto valor?", options: [ "3 valores, el cuarto no existe", "5 valores, el cuarto es el tamaño de expansión", "4 valores, el cuarto es la transparencia", "6 valores, el cuarto es el ángulo" ], correct: 1, explanation: "box-shadow tiene 5 valores: Desplazamiento H, Desplazamiento V, Radio difuminado, Tamaño de expansión, Color." },
            { id: 24, question: "Por defecto, ¿cómo calcula el navegador el tamaño total de un elemento con box-sizing?", options: [ "Solo el contenido", "Contenido + padding + border (suma todo)", "Contenido + margin", "Solo el border" ], correct: 1, explanation: "Por defecto (content-box), el navegador SUMA al width el padding y el border." },
            { id: 25, question: "¿Qué valor de box-sizing incluye el padding pero NO el border dentro del width?", options: [ "content-box", "border-box", "padding-box", "inner-box" ], correct: 2, explanation: "box-sizing: padding-box incluye el padding dentro del width pero no el border." },
            { id: 26, question: "¿Qué ocurre con un elemento que tiene position: static al intentar usar top o left?", options: [ "Se mueve normalmente", "Se convierte automáticamente en relative", "No le afectan estas propiedades, sigue el flujo normal", "Genera un error de CSS" ], correct: 2, explanation: "position: static (valor por defecto) no es afectado por top, left, right o bottom." },
            { id: 27, question: "¿Respecto a qué se posiciona un elemento con position: absolute?", options: [ "Respecto a la ventana del navegador", "Respecto a su posición original", "Respecto al elemento contenedor padre posicionado", "Respecto al body siempre" ], correct: 2, explanation: "position: absolute se posiciona respecto al elemento contenedor padre que tenga position (relativo, absoluto o fijo)." },
            { id: 28, question: "Un elemento con position: fixed permanece visible aunque se haga scroll. ¿Por qué?", options: [ "Porque se posiciona respecto al body", "Porque utiliza la ventana del navegador como referencia", "Porque tiene z-index automático", "Porque bloquea el scroll" ], correct: 1, explanation: "position: fixed usa la ventana del navegador como referencia, por eso siempre es visible con scroll." },
            { id: 29, question: "¿Qué hace background-size: contain?", options: [ "Recorta la imagen para llenar todo el contenedor", "Ajusta la imagen para que se vea completa, pudiendo dejar huecos", "Repite la imagen", "Centra la imagen sin cambiar su tamaño" ], correct: 1, explanation: "background-size: contain ajusta la imagen para que se vea completa, aunque deje espacios vacíos." },
            { id: 30, question: "Si quieres que una imagen de fondo se repita solo horizontalmente, ¿qué valor usas?", options: [ "repeat-horizontal", "repeat-x", "horizontal-repeat", "x-repeat" ], correct: 1, explanation: "background-repeat: repeat-x hace que la imagen se repita solo horizontalmente." },
            { id: 31, question: "En background-position, si especificas 'right bottom', ¿dónde se alinea la imagen?", options: [ "Esquina superior derecha", "Esquina inferior izquierda", "Esquina inferior derecha", "Centro derecho" ], correct: 2, explanation: "background-position: right bottom alinea la imagen en la esquina inferior derecha." },
            { id: 32, question: "¿Cuál es la diferencia entre display: flex y display: inline-flex?", options: [ "No hay diferencia", "flex organiza en columna, inline-flex en fila", "flex hace que el contenedor sea de bloque, inline-flex lo hace de línea", "inline-flex no permite flex-direction" ], correct: 2, explanation: "display: flex hace que el contenedor sea de bloque (ocupa todo el ancho), mientras que inline-flex lo hace comportarse como elemento de línea." },
            { id: 33, question: "¿Cuál es el valor por defecto de flex-direction?", options: [ "column", "row", "row-reverse", "horizontal" ], correct: 1, explanation: "El valor por defecto de flex-direction es row (fila horizontal)." },
            { id: 34, question: "En la propiedad flex: 2 1 100px, ¿qué significa el primer valor (2)?", options: [ "El tamaño inicial en píxeles", "Cuánto se encoge si falta espacio", "Cuánto se expande para llenar espacio sobrante", "El número de columnas" ], correct: 2, explanation: "El primer valor en flex es 'grow': cuánto se expande el elemento para llenar espacio sobrante." },
            { id: 35, question: "En flex: 1 0 200px, ¿qué indica el segundo valor (0)?", options: [ "Que no se encoge aunque falte espacio", "Que ocupa 0 píxeles inicialmente", "Que no tiene padding", "Que no se puede expandir" ], correct: 0, explanation: "El segundo valor es 'shrink': con 0, el elemento no se encoge aunque falte espacio." },
            { id: 36, question: "¿Qué etiqueta meta previene que los móviles 'alejen' artificialmente la página?", options: [ "meta responsive", "meta viewport con width=device-width", "meta mobile", "meta scale" ], correct: 1, explanation: "La meta viewport con width=device-width indica que el ancho de la página debe ser igual al del dispositivo." },
            { id: 37, question: "En una media query, ¿qué característica permite detectar si el dispositivo está en modo vertical u horizontal?", options: [ "screen-type", "orientation", "display-mode", "rotation" ], correct: 1, explanation: "La característica 'orientation' detecta si el dispositivo está en portrait (vertical) o landscape (horizontal)." },
            { id: 38, question: "¿Cuál es el tipo de medio más común en media queries para pantallas?", options: [ "display", "screen", "monitor", "browser" ], correct: 1, explanation: "El tipo de medio 'screen' se usa en el 99% de los casos para dispositivos con pantalla." },
            { id: 39, question: "En Mobile-First, ¿cómo se estructuran los estilos CSS?", options: [ "Primero desktop, luego móvil con max-width", "Primero móvil como base, luego añadir complejidad con min-width", "Todo con max-width", "Sin media queries" ], correct: 1, explanation: "Mobile-First implica diseñar primero para móvil (estilos base) y luego añadir complejidad para pantallas grandes con min-width." },
            { id: 40, question: "Para incluir jQuery desde un CDN, ¿dónde se recomienda colocar el <script>?", options: [ "En el <head>", "Al inicio del <body>", "Al final del <body>", "En un archivo CSS" ], correct: 2, explanation: "Los scripts de JavaScript/jQuery se colocan al final del <body> para no bloquear la carga del contenido." },
            { id: 41, question: "Al usar DataTables, ¿qué librería debe cargarse primero?", options: [ "DataTables", "jQuery", "Bootstrap", "El orden no importa" ], correct: 1, explanation: "jQuery debe cargarse primero porque DataTables depende de esta librería." },
            { id: 42, question: "Para inicializar DataTables en una tabla con id='miTabla', ¿qué código usas?", options: [ "$('#miTabla').table();", "$('#miTabla').DataTable();", "DataTable('#miTabla');", "initTable('#miTabla');" ], correct: 1, explanation: "Se usa $('#miTabla').DataTable(); para inicializar DataTables en una tabla específica." },
            { id: 43, question: "¿Qué keyword de font-size representa un tamaño mediano?", options: [ "mid", "medium", "middle", "average" ], correct: 1, explanation: "medium es la keyword para tamaño mediano. Las keywords van desde x-small hasta x-large." },
            { id: 44, question: "Si border-radius tiene un solo valor, ¿a cuántas esquinas afecta?", options: [ "Solo a la superior izquierda", "A las dos superiores", "A las 4 esquinas por igual", "Solo a las esquinas derecha" ], correct: 2, explanation: "Un solo valor en border-radius aplica la misma curvatura a las 4 esquinas." },
            { id: 45, question: "En el shorthand de margin con 4 valores, el segundo valor corresponde a:", options: [ "Margen superior", "Margen derecho", "Margen inferior", "Margen izquierdo" ], correct: 1, explanation: "En el orden Arriba-Derecha-Abajo-Izquierda, el segundo valor es el margen derecho." },
            { id: 46, question: "¿Los márgenes horizontales entre dos elementos adyacentes se suman o colapsan?", options: [ "Se suman normalmente", "Colapsan (se aplica el mayor)", "Se multiplican", "Se ignoran" ], correct: 0, explanation: "Los márgenes horizontales SÍ se suman. Solo los verticales colapsan." },
            { id: 47, question: "¿Qué valor de background-repeat repite la imagen solo verticalmente?", options: [ "repeat-y", "repeat-vertical", "y-repeat", "vertical" ], correct: 0, explanation: "background-repeat: repeat-y repite la imagen solo en el eje vertical." },
            { id: 48, question: "Para que DataTables funcione, ¿qué selector jQuery se debe usar sobre qué elemento HTML?", options: [ "Se aplica sobre un <div>", "Se aplica sobre una <table>", "Se aplica sobre el <body>", "Se aplica sobre un <form>" ], correct: 1, explanation: "DataTables se inicializa sobre una tabla HTML (<table>) seleccionada por su ID." },
            { id: 49, question: "Si usas background-position: center top, ¿dónde se posiciona la imagen?", options: [ "Centrada verticalmente, arriba horizontalmente", "Centrada horizontalmente, arriba verticalmente", "Esquina superior derecha", "Totalmente centrada" ], correct: 1, explanation: "background-position: center top centra la imagen horizontalmente y la coloca arriba verticalmente." },
            { id: 50, question: "¿Qué valor de flex-direction invierte el orden visual de los elementos en una fila?", options: [ "row-reverse", "reverse-row", "invert", "backwards" ], correct: 0, explanation: "flex-direction: row-reverse invierte el orden visual de los elementos en una fila horizontal." },
            { id: 51, question: "Al incluir una hoja de estilos con <link>, ¿qué atributo especifica la ruta del archivo?", options: [ "src", "href", "path", "file" ], correct: 1, explanation: "El atributo href especifica la ruta del archivo CSS en la etiqueta <link>." },
            { id: 52, question: "¿Qué tipo de archivo tiene DataTables como dependencia obligatoria?", options: [ "Bootstrap CSS", "jQuery JS", "React JS", "Angular JS" ], correct: 1, explanation: "DataTables requiere obligatoriamente jQuery como dependencia para funcionar." },
            { id: 53, question: "En una media query con min-width: 768px, ¿cuándo se aplican esos estilos?", options: [ "Cuando la pantalla es menor de 768px", "Solo cuando la pantalla es exactamente 768px", "Cuando la pantalla es de 768px o mayor", "Nunca se aplican" ], correct: 2, explanation: "min-width: 768px aplica los estilos cuando el ancho de la ventana es de 768px o mayor." },
            { id: 54, question: "¿Qué sufijo se usa para especificar solo el margen izquierdo?", options: [ "margin-left", "margin-l", "left-margin", "ml" ], correct: 0, explanation: "Se usa margin-left para especificar solo el margen izquierdo. Los sufijos son: -left, -right, -top, -bottom." },
            { id: 55, question: "Si defines color: blue en CSS, ¿a qué afecta esta propiedad?", options: [ "Al color de fondo", "Al color del borde", "Al color del texto", "Al color de la sombra" ], correct: 2, explanation: "La propiedad 'color' afecta al color del texto. Para el fondo se usa 'background-color'." },
            { id: 56, question: "¿Qué formato de color permite especificar valores de 0 a 255 para cada canal RGB?", options: [ "Hexadecimal", "RGB Decimal", "Nombre del color", "RGB Porcentajes" ], correct: 1, explanation: "RGB Decimal permite valores de 0 a 255: rgb(255, 0, 0). RGB Porcentajes usa valores como rgb(100%, 0%, 0%)." },
            { id: 57, question: "Si defines text-transform: uppercase, ¿qué ocurre con el texto?", options: [ "Se convierte a minúsculas", "Se convierte a mayúsculas", "Se capitaliza cada palabra", "Se invierte" ], correct: 1, explanation: "text-transform: uppercase convierte todo el texto a mayúsculas." },
            { id: 58, question: "¿Qué unidad de medida representa el 100% de la altura de la ventana visible?", options: [ "100%", "100vh", "100vw", "full-height" ], correct: 1, explanation: "100vh (Viewport Height) representa el 100% de la altura de la ventana visible." },
            { id: 59, question: "¿Qué propiedad controla el grosor/peso de la fuente?", options: [ "font-size", "font-weight", "font-thick", "text-weight" ], correct: 1, explanation: "font-weight controla el grosor de la fuente (bold, normal, o valores numéricos)." },
            { id: 60, question: "En una media query, ¿qué tipo de medio se usa para impresoras?", options: [ "printer", "print", "paper", "document" ], correct: 1, explanation: "El tipo de medio 'print' se usa para estilos destinados a impresoras." }
        ];

        // --- LÓGICA DE PROGRAMACIÓN ---
        const container = document.getElementById('quiz-container');

        // Función para verificar la respuesta
        window.checkAnswer = function(questionId, selectedOptionIndex, btnElement) {
            // Buscamos la pregunta en el array
            const questionObj = questions.find(q => q.id === questionId);
            
            // Si no encuentra la pregunta o ya se respondió (tiene clase disabled), no hace nada
            if (!questionObj || btnElement.parentElement.classList.contains('answered')) return;

            // Marcamos el contenedor de opciones como "respondido" para bloquear más clics
            const optionsDiv = btnElement.parentElement;
            optionsDiv.classList.add('answered');
            
            // Deshabilitar todos los botones de esta pregunta
            const allButtons = optionsDiv.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);

            // Verificar si es correcta
            const isCorrect = selectedOptionIndex === questionObj.correct;

            if (isCorrect) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('incorrect');
                // Resaltar la correcta para aprender
                allButtons[questionObj.correct].classList.add('correct');
            }

            // Mostrar la explicación
            const explanationDiv = document.getElementById(`explanation-${questionId}`);
            explanationDiv.style.display = 'block';
        };

        // Renderizar las preguntas al cargar
        questions.forEach(q => {
            // Crear el HTML de las opciones
            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                optionsHtml += `<button class="option-btn" onclick="checkAnswer(${q.id}, ${index}, this)">${opt}</button>`;
            });

            // Crear la tarjeta completa
            const cardHtml = `
                <div class="question-card">
                    <div class="question-title">${q.id}. ${q.question}</div>
                    <div class="options-grid">
                        ${optionsHtml}
                    </div>
                    <div class="explanation-box" id="explanation-${q.id}">
                        <strong>Explicación:</strong>
                        <p class="explanation-text">${q.explanation}</p>
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });
    </script>
</body>
</html>
