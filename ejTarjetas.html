<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ej. Tarjetas</title>
        <link rel="stylesheet" href="estilos.css" />
    </head>
    <body>
        <div class="container-principal">
            <!-- Barra de Navegación -->
            <header class="navbar">
                <div class="logo">FlexApp Logo</div>
                <nav>
                    <a href="#">Inicio</a>
                    <a href="#">Servicios</a>
                    <a href="#">Contacto</a>
                </nav>
            </header>

            <!-- Sección de Tarjetas -->
            <section>
                <h2>Nuestros Productos</h2>
                <div class="card-container">
                    <div class="card">
                        <h3>Tarjeta 1</h3>
                        <p>Contenido principal del producto uno.</p>
                    </div>
                    <div class="card">
                        <h3>Tarjeta 2 (Alineación Individual)</h3>
                        <p>
                            Este elemento está alineado individualmente
                            (Desafío).
                        </p>
                    </div>
                    <div class="card">
                        <h3>Tarjeta 3</h3>
                        <p>Contenido principal del producto tres.</p>
                    </div>
                    <div class="card">
                        <h3>Tarjeta 4</h3>
                        <p>Contenido adicional.</p>
                    </div>
                </div>
            </section>
        </div>
    </body>
</html>
