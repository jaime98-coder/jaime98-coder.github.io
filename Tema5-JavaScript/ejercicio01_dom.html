<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 01 - DOM Manipulation</title>
</head>

<body>
    <input type="text" id="nombre" placeholder="Introduce tu nombre">
    <input type="number" id="edad" placeholder="Introduce tu edad">
    <br>
    <button id="botonEnviar">Enviar</button>
    <br><br><br>
    <input type="number" id ="num1" placeholder="Introduce un número">
    <input type="number" id ="num2" placeholder="Introduce un número">
        <button id="botonSuma"> + </button>
    <button id="botonResta"> - </button>
    <button id="botonMultiplicacion"> * </button>
    <button id="botonDivision"> / </button>
    <br>
    <text id="resultado" style="font-weight: bold;"></text>




    <script>
        let inputNombre = document.querySelector("#nombre");
        let inputEdad = document.querySelector("#edad");
        let botonEnviar = document.querySelector("#botonEnviar");
        botonEnviar.addEventListener("click", function () {

            alert("Hola " + inputNombre.value + ", tienes " + inputEdad.value + " años.");

        })

        let inputNum1=document.querySelector("#num1");
        let inputNum2=document.querySelector("#num2");
        let botonSuma=document.querySelector("#botonSuma");
        let botonResta=document.querySelector("#botonResta");
        let botonMultiplicacion=document.querySelector("#botonMultiplicacion");
        let botonDivision=document.querySelector("#botonDivision");
        let resultado=document.querySelector("#resultado");
        botonSuma.addEventListener("click", function () {
            resultado.textContent = Number(inputNum1.value) + Number(inputNum2.value);

        })
        

        // Calculadora

    </script>
</body>

</html>
