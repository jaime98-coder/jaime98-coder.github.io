    <script>
        // Saludo personalizado
        let nombre;
        nombre = prompt("¿Cuál es tu nombre?", "Escribe tu nombre aquí");
        console.log("Bienvenido al curso de JS, " + nombre);

        // Suma rápida
        let num1;
        let num2;
        num1=prompt("Introduce el primer número");
        num2=prompt("Introduce el segundo número");

    </script>
