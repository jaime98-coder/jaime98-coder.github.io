<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />

        <title>Los cubiletes</title>
        <style>
            body {
                font-family:

            }
            input {
                display: block;
                width: 30%;

                padding: 8px;

                width: 30%;

                cursor: pointer;
            }

    <body>

            <input type="hidden" value="2" id="num_ejer" />
            <input type="text" id="usuario" placeholder="Usuario..." />
            <input type="password" placeholder="Password..." />
            <button type="submit">Enviar Formulario</button>
        </form>

        <h3 id="mensajeSistema"></h3>

        <ol id="rankingGanadores"></ol>
