<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Cubiletes</title>
</head>

<body>
    <h1>Los Cubiletes</h1>
    <h2>Jaime Martin</h2>
    <form id="formulario">
        <input type="hidden" value="Jaime" id="nom_alum">
        <input type="hidden" value="2" id="num_ejer">
        <input type="text" id="usuario" placeholder="Introduce nombre usuario">
        <input type="password" id="password" placeholder="Introduce contraseña">
        <button type="submit" id="btnEnviar">Enviar</button>
    </form>
    
    <h3 id="mensajeSistema"></h3>
    <ol id="listaRanking"></ol>
    
    <script>
        // =========================================================================
        // 🚨 SIMULADOR DE API PARA PROBAR EN CASA (Bórralo el día del examen) 🚨
        // =========================================================================
        const fetchOriginal = window.fetch;
        window.fetch = async function(url, opciones) {
            await new Promise(r => setTimeout(r, 400)); 
            
            if (url.includes("/api/vasos")) {
                return { ok: true, json: async () => ({ vasos: 3, mensaje: "Login correcto" }) };
            }
            if (url.includes("/api/jugar")) {
                let cuerpo = JSON.parse(opciones.body);
                // Si eliges el vaso 2, ganas.
                if (cuerpo.eleccion === 2) {
                    return { ok: true, json: async () => ({ mensaje: "¡Enhorabuena, has encontrado la bolita!", ranking: [cuerpo.usuario, "Maria", "Pedro"] }) };
                } else {
                    return { ok: true, json: async () => ({ mensaje: "¡Oh no! El vaso estaba vacío.", ranking: ["Maria", "Pedro"] }) };
                }
            }
            return fetchOriginal(url, opciones);
        };
        // =========================================================================
        // FIN DEL SIMULADOR. A PARTIR DE AQUÍ VA TU CÓDIGO PERFECTO:
        // =========================================================================

        const formulario = document.querySelector("#formulario");
        const inputNom_alum = document.querySelector("#nom_alum");
        const inputNum_ejer = document.querySelector("#num_ejer");
        const inputUsuario = document.querySelector("#usuario");
        const inputPassword = document.querySelector("#password");
        const btnEnviar = document.querySelector("#btnEnviar");
        const mensajeSistema = document.querySelector("#mensajeSistema");
        const listaRanking = document.querySelector("#listaRanking");

        formulario.addEventListener("submit", function (evento) {
            evento.preventDefault();
            
            if (inputUsuario.value === "" || inputPassword.value === "") {
                alert("Alerta hay campos vacíos");
                return;
            }
            gestionarEnvio();
        });

        async function gestionarEnvio() {
            let datosUsuario = {
                nom_alum: inputNom_alum.value,
                num_ejer: inputNum_ejer.value,
                usuario: inputUsuario.value,
                password: inputPassword.value
            };

            try {
                let respuesta = await fetch("http://192.168.100.150/api/vasos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datosUsuario)
                });

                let respuestaServidor = await respuesta.json();
                console.log(respuestaServidor);
                
                if (respuesta.ok) {
                    listaRanking.innerHTML = "";
                    inputUsuario.disabled = true;
                    inputPassword.disabled = true;
                    
                    let zonaAntigua = document.querySelector("#zonaJuego");
                    if (zonaAntigua != null) {
                        zonaAntigua.remove();
                    }
                    
                    let numeroVasos = respuestaServidor.vasos;
                    let zonaJuego = document.createElement("div");
                    zonaJuego.id = "zonaJuego";
                    document.body.appendChild(zonaJuego);

                    for (let i = 0; i < numeroVasos; i++) {
                        let botonVaso = document.createElement("button");
                        botonVaso.textContent = "Vaso " + (i + 1);

                        botonVaso.addEventListener("click", function () {
                            enviarJugada(i + 1);
                        });
                        zonaJuego.appendChild(botonVaso);
                    }
                    mensajeSistema.textContent = "¡A jugar! Elige un vaso.";
                    mensajeSistema.style.color = "black";
                } else {
                    mensajeSistema.textContent = "Error al logar. Revisa los datos";
                }
            } catch (error) {
                console.error("Fallo de conexión en el login", error);
                mensajeSistema.textContent = "Error de conexión con el servidor.";
                mensajeSistema.style.color = "red";
            }
        }

        async function enviarJugada(vasoElegido) {
            let datosJugada = {
                usuario: inputUsuario.value,
                eleccion: vasoElegido
            };
            
            try {
                let respuesta = await fetch("http://192.168.100.150/api/jugar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(datosJugada)
                });
                
                let respuestaServidor = await respuesta.json();
                
                if (respuesta.ok) {
                    let zonaJuego = document.querySelector("#zonaJuego");
                    zonaJuego.innerHTML = "";

                    mensajeSistema.textContent = respuestaServidor.mensaje;
                    mensajeSistema.style.color = "blue";

                    listaRanking.innerHTML = "";
                    let arrayRanking = respuestaServidor.ranking;
                    arrayRanking.forEach(ganador => {
                        let li = document.createElement("li");
                        li.textContent = ganador;
                        listaRanking.appendChild(li);
                    });
                }
            } catch (error) {
                console.error("¡¡Error!!");
            }
        }
    </script>
</body>

</html>
