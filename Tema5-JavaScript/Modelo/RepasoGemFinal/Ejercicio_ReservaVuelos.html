<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>"Space-Transit" (Reserva de Vuelos)</title>
    </head>
    <body>
        <h1>"Space-Transit" (Panel de Embarque)</h1>
        <h2>Jaime Martin</h2>

        <button type="button" id="btnCargarDestinos">
            Cargar Destinos Disponibles
        </button>
        <br /><br />

        <form id="formularioReserva">
            <input type="hidden" id="nom_alum" value="Jaime Martin" />

            <label for="selectDestinos"
                >Selecciona tu destino intergaláctico:</label
            >
            <select id="selectDestinos">
                <option value="">-- Esperando carga de rutas... --</option>
            </select>

            <br /><br />
            <button type="submit">Confirmar Reserva de Vuelo</button>
        </form>

        <h3 id="mensajeSistema"></h3>
        <br />

        <h3>Historial de Billetes Confirmados</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>Piloto / Pasajero</th>
                    <th>Código de Destino</th>
                    <th>Estado del Vuelo</th>
                </tr>
            </thead>
            <tbody id="bodyTabla"></tbody>
        </table>

        <script>
            // === 1. CAPTURA DE ELEMENTOS ===
            const btnCargarDestinos =
                document.querySelector("#btnCargarDestinos");
            const formularioReserva =
                document.querySelector("#formularioReserva");
            const nom_alum = document.querySelector("#nom_alum");
            const selectDestinos = document.querySelector("#selectDestinos");
            const mensajeSistema = document.querySelector("#mensajeSistema");
            const bodyTabla = document.querySelector("#bodyTabla"); // <-- Captura de la tabla

            // Array global local para ir acumulando las reservas que tengan éxito
            let historialReservas = [];

            // === 2. EVENTOS (LISTENERS) ===
            btnCargarDestinos.addEventListener("click", function () {
                cargarRutasEspaciales();
            });

            formularioReserva.addEventListener("submit", function (evento) {
                procesarVuelo(evento);
            });

            // === 3. FUNCIÓN GET: RELLENAR EL SELECT ===
            async function cargarRutasEspaciales() {
                try {
                    let respuesta = await fetch(
                        "http://localhost:3000/api/destinos",
                    );
                    let datos = await respuesta.json();

                    selectDestinos.innerHTML = "";

                    for (let i = 0; i < datos.length; i++) {
                        let nuevaOpcion = document.createElement("option");
                        nuevaOpcion.value = datos[i].codigo; // Lo que lee la máquina ("LUN-01")
                        nuevaOpcion.textContent = datos[i].nombre; // Lo que lee el ojo humano ("Estación Lunar Alfa")
                        selectDestinos.appendChild(nuevaOpcion);
                    }
                } catch (error) {
                    console.error("ERROR al conectar con la API de destinos");
                }
            }

            // === 4. FUNCIÓN POST: LEER SELECT Y ENVIAR ===
            async function procesarVuelo(evento) {
                evento.preventDefault();

                // Leemos el .value directo del select seleccionado por el usuario
                let datosFormulario = {
                    piloto: nom_alum.value,
                    destino_codigo: selectDestinos.value,
                };

                try {
                    let respuesta = await fetch(
                        "http://localhost:3000/api/reserva",
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(datosFormulario),
                        },
                    );

                    let datos = await respuesta.json();

                    if (datos.status === "success") {
                        mensajeSistema.textContent = datos.msg;
                        mensajeSistema.style.color = "green";

                        // 🌟 ACCIÓN VISUAL: Si el servidor da el OK, guardamos los datos locales en nuestro array
                        let nuevaReserva = {
                            piloto: datosFormulario.piloto,
                            destino: datosFormulario.destino_codigo,
                            estado: "Confirmado",
                        };
                        historialReservas.push(nuevaReserva);

                        // Llamamos a la función encargada de pintar la tabla pasándole el historial actualizado
                        pintarTablaReservas(historialReservas);

                        // Reseteamos el formulario
                        formularioReserva.reset();
                    } else if (datos.status === "error") {
                        mensajeSistema.textContent = datos.msg;
                        mensajeSistema.style.color = "red";
                    }
                } catch (error) {
                    console.error("ERROR de conexión al reservar.");
                }
            }

            // === 5. FUNCIÓN AUXILIAR: PINTAR LA TABLA DINÁMICA ===
            function pintarTablaReservas(arrayDatos) {
                // Obligatorio: Vaciar el cuerpo de la tabla para que no se dupliquen las filas viejas
                bodyTabla.innerHTML = "";

                // Recorremos el historial acumulado
                for (let i = 0; i < arrayDatos.length; i++) {
                    // 1. Creamos la fila (tr)
                    let fila = document.createElement("tr");

                    // 2. Creamos las tres celdas (td)
                    let celdaPiloto = document.createElement("td");
                    let celdaDestino = document.createElement("td");
                    let celdaEstado = document.createElement("td");

                    // 3. Le metemos el texto correspondiente a cada celda
                    celdaPiloto.textContent = arrayDatos[i].piloto;
                    celdaDestino.textContent = arrayDatos[i].destino;
                    celdaEstado.textContent = arrayDatos[i].estado;

                    // 4. Metemos las celdas dentro de la fila
                    fila.appendChild(celdaPiloto);
                    fila.appendChild(celdaDestino);
                    fila.appendChild(celdaEstado);

                    // 5. Metemos la fila terminada dentro del cuerpo de la tabla en el HTML
                    bodyTabla.appendChild(fila);
                }
            }
        </script>
    </body>
</html>
