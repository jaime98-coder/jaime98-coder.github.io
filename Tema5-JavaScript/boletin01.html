    <title>Boletin A (1)</title>

<body>
    

    <script>
        // Presentación Proactiva
        let ciudad="Bilbao";
        const pais = "España";
        console.log("Vivo en "+ciudad+" que está en "+pais);

        // Cálculo de IVA
        let precio;
        precio= 19.95;
        const IVA = 0.21;
        let precioFinal = precio+(+precio*IVA);
        console.log("El precio final es "+precioFinal+"€");
        
        // Convesor de Años a Dias
        let edad;
        edad = 27;
        let diasVividos;
        diasVividos = edad*365;
        console.log("Has vivido aproximadamente "+diasVividos+" días");
    </script>
