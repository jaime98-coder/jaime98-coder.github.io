<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ejercicio 3: RETO (Versión CRUD con Splice)</title>
        <style>
            body {
                padding: 20px;
                font-family: sans-serif;
            }
            #cajaHobbies {
                border: 1px solid black;
                margin: 10px 0;
                padding: 20px;
                width: 800px;
            }
            table {
                border-collapse: collapse;
                width: 800px;
                margin-top: 20px;
            }
            th,
            td {
                border: 1px solid black;
                padding: 8px;
                text-align: left;
                vertical-align: top;
            }
            tbody tr {
                cursor: pointer;
            }
            tbody tr:hover {
                background-color: #ffe6e6;
            }
        </style>
    </head>
    <body>
        <form id="formulario">
            <label for="nombre">Nombre:</label>
            <input type="text" placeholder="Nombre" id="inputNombre" required />
            <label for="apellidos">Apellidos:</label>
            <input
                type="text"
                placeholder="Apellidos"
                id="inputApellidos"
                required
            />
            <label for="edad">Edad:</label>
            <input type="number" placeholder="Edad" id="inputEdad" required />
            <label for="ciudad">Ciudad:</label>
            <input type="text" placeholder="Ciudad" id="inputCiudad" required />
            <br /><br />

            <div id="cajaHobbies">
                <div>Hobbies (Máx 3):</div>
                <input type="checkbox" class="checkBody" value="Deporte" />
                <label>Deporte</label>
                <input type="checkbox" class="checkBody" value="Lectura" />
                <label>Lectura</label>
                <input type="checkbox" class="checkBody" value="Música" />
                <label>Música</label>
                <input type="checkbox" class="checkBody" value="Juegos" />
                <label>Juegos</label>
                <input type="checkbox" class="checkBody" value="Cine" />
                <label>Cine</label>
                <input type="checkbox" class="checkBody" value="Teatro" />
                <label>Teatro</label>
                <input
                    type="checkbox"
                    class="checkBody"
                    value="Coleccionismo"
                />
                <label>Coleccionismo</label>
                <input type="checkbox" class="checkBody" value="Bricolaje" />
                <label>Bricolaje</label>
                <input type="checkbox" class="checkBody" value="Cosplay" />
                <label>Cosplay</label>
            </div>
            <br />
            <button type="submit" id="btnInsertar">Pulsa para insertar</button>
            <br /><br />

            <table border="3px">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Apellidos</th>
                        <th>Edad</th>
                        <th>Ciudad</th>
                        <th>Hobbies</th>
                    </tr>
                </thead>
                <tbody id="bodyTabla"></tbody>
            </table>
        </form>

        <script>
            // 1. CAPTURAS DEL DOM
            const inputNombre = document.querySelector("#inputNombre");
            const inputApellidos = document.querySelector("#inputApellidos");
            const inputEdad = document.querySelector("#inputEdad");
            const inputCiudad = document.querySelector("#inputCiudad");
            const bodyTabla = document.querySelector("#bodyTabla");
            const formulario = document.querySelector("#formulario");
            const todosLosHobbies = document.querySelectorAll(".checkBody");

            // 2. NUESTRA "BASE DE DATOS"
            let listaUsuarios = [];

            // 3. LÓGICA DEL RETO (Límite 3 Hobbies)
            todosLosHobbies.forEach(function (checkBox) {
                checkBox.addEventListener("change", function () {
                    const checkBoxMarcados =
                        document.querySelectorAll(".checkBody:checked");
                    if (checkBoxMarcados.length >= 3) {
                        todosLosHobbies.forEach(function (caja) {
                            if (!caja.checked) caja.disabled = true;
                        });
                    } else {
                        todosLosHobbies.forEach(function (caja) {
                            caja.disabled = false;
                        });
                    }
                });
            });

            // 4. EL ENVÍO DEL FORMULARIO
            formulario.addEventListener("submit", function (evento) {
                evento.preventDefault();
                procesarDatos();
                formulario.reset();
                todosLosHobbies.forEach(function (caja) {
                    caja.disabled = false;
                });
            });

            // 5. GUARDAR DATOS EN EL ARRAY
            function procesarDatos() {
                let listaHobbies = [];
                const marcados =
                    document.querySelectorAll(".checkBody:checked");

                marcados.forEach(function (caja) {
                    listaHobbies.push(caja.value);
                });

                // Objeto limpio, tal y como te lo piden en clase
                let nuevoUsuario = {
                    nombre: inputNombre.value,
                    apellido: inputApellidos.value,
                    edad: inputEdad.value,
                    ciudad: inputCiudad.value,
                    hobbies: listaHobbies,
                };

                listaUsuarios.push(nuevoUsuario);
                pintarTabla();
            }

            // 6. FABRICAR LA TABLA
            function pintarTabla() {
                bodyTabla.innerHTML = "";

                // ALERTA: Le pasamos 'indice' al bucle para saber la posición 0, 1, 2...
                listaUsuarios.forEach(function (usuario, indice) {
                    let tr = document.createElement("tr");

                    let tdNombre = document.createElement("td");
                    tdNombre.textContent = usuario.nombre;
                    tr.appendChild(tdNombre);

                    let tdApellidos = document.createElement("td");
                    tdApellidos.textContent = usuario.apellido;
                    tr.appendChild(tdApellidos);

                    let tdEdad = document.createElement("td");
                    tdEdad.textContent = usuario.edad;
                    tr.appendChild(tdEdad);

                    let tdCiudad = document.createElement("td");
                    tdCiudad.textContent = usuario.ciudad;
                    tr.appendChild(tdCiudad);

                    let tdHobbies = document.createElement("td");
                    tdHobbies.innerHTML = usuario.hobbies.join("<br>");
                    tr.appendChild(tdHobbies);

                    // Al hacer doble clic, llamamos a borrar pasándole el 'indice' (su posición)
                    tr.addEventListener("dblclick", function () {
                        borrarUsuario(indice);
                    });

                    bodyTabla.appendChild(tr);
                });
            }

            // 7. BORRAR DEL ARRAY Y REPINTAR
            function borrarUsuario(indiceParaBorrar) {
                // El método .splice se sitúa en la posición indicada y borra 1 elemento
                listaUsuarios.splice(indiceParaBorrar, 1);

                // Repintamos la tabla (ahora tendrá una fila menos)
                pintarTabla();
            }
        </script>
    </body>
</html>
