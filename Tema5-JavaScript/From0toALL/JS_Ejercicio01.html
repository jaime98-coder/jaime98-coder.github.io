<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label for="nombre">Nombre: </label>
    <input type="text" id="nombre">

    <label for="edad">Edad</label>
    <input type="number" id="edad">

    <button id="btnEnviar">Enviar</button>
    <br>
    <br>
    <br>
    <label for="numero1">Numero 1: </label>
    <input type="number" id="numero1">
    <label for="numero2">Numero 2: </label>
    <input type="number" id="numero2">
    <button id="btnCalcular">Calcular</button>
    <p id="resultado"> </p>

    <script>
        let boton = document.querySelector("#btnEnviar")

        boton.addEventListener("click", function () {
            let nombre = document.querySelector("#nombre").value
            let edad = document.querySelector("#edad").value
            let parrafoCreado = document.createElement("p")
            parrafoCreado.textContent = "Mi nombre es " + nombre + " y tengo " + edad + " años."
            document.body.appendChild(parrafoCreado)
        });

        let botonCalcular = document.querySelector("#btnCalcular")
        botonCalcular.addEventListener("click", function () {
            let input1 = document.querySelector("#numero1").value
            let input2 = document.querySelector("#numero2").value
            let suma = parseInt(input1) + parseInt(input2)
            let diferencia = parseInt(input1) - parseInt(input2)
            let producto = parseInt(input1) * parseInt(input2)
            let cociente = parseInt(input1) / parseInt(input2)
            let parrafoResultado = document.querySelector("#resultado")
            parrafoResultado.textContent = "Suma: " + suma + " | Diferencia: " + diferencia + " | Producto: " + producto + " | Cociente: " + cociente

        });



    </script>
</body>

</html>
