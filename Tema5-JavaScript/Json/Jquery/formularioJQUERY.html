<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Dinámica con jQuery</title>
    <style>
        #formulario {
            border: 2px solid #333;
            width: 300px;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 3px 3px 10px black;
        }
    </style>
</head>

<body>
    <form id="formulario">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre"><br><br>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido"><br><br>
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad"><br><br>
        <label for="ciudad">Ciudad:</label>
        <input type="text" id="ciudad" name="ciudad"><br><br>
        <button type="button" id="btnEnviar">Enviar</button>
    </form>

    <br>
    <table border="2">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Ciudad</th>
            </tr>
        </thead>
        <tbody id="bodyTabla">
        </tbody>
    </table>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script>
        // Creación de recursos que necesitaré.
        let listaEdades = []; // Aquí guardaremos los datos de cada persona para luego hacer cálculos con ellos

        // --- FUNCIÓN 1: El Director de Orquesta ---
        // Esta función se activa al hacer clic en enviar. Recoge los datos y llama a los demás.
        function recogerDatos() {
            // Creamos un objeto "Persona" nuevo cada vez que hacemos clic
            // Esto es más seguro que tenerlo suelto por ahí arriba
            let Persona = {
                nombre: $("#nombre").val(),
                apellido: $("#apellido").val(),
                edad: parseInt($("#edad").val()),
                ciudad: $("#ciudad").val()
            };

            // Localizamos la tabla donde vamos a meter los datos
            let tabla = $("#bodyTabla");

            // Le pasamos la tabla y los datos del formulario a nuestra función creadora
            insertaFila(tabla, Persona);

            // Le paso la funcion que se encarga de calcular los datos de edades a la que se le ha añadido la edad de la persona actual
            listaEdades.push(Persona.edad);
            calcularDatosEdades();

            // Una vez insertada la fila, llamamos a la función que limpia todo
            limpiarCampos();
        }

        // --- FUNCIÓN 2: El Constructor de Filas ---
        // Se encarga de crear el TR, añadirle el evento de borrado y pegarlo en la tabla
        function insertaFila(tabla, datos) {
            // 1. Creamos la fila (TR) vacía
            let fila = $('<tr>');

            // 2. Le damos el "superpoder" de borrarse al hacer clic (La idea de tu profe)
            fila.on("click", function () {
                let siBorrar = confirm(`¿Desea eliminar a ${datos.nombre} ${datos.apellido}?`);
                if (siBorrar) {
                    $(this).remove(); // "this" hace referencia a la fila a la que le hemos hecho clic
                }
            });

            // 3. Llamamos a la otra función para que rellene esta fila vacía con las celdas (TD)
            insertaCeldas(fila, datos);

            // 4. Finalmente, pegamos la fila (ya rellenada) en la tabla
            tabla.append(fila);
        }

        // --- FUNCIÓN 3: El Rellenador de Celdas ---
        // Solo hace una cosa: crear TD, ponerles el texto y meterlos dentro de la fila
        function insertaCeldas(fila, datos) {
            // Creamos cada celda, le metemos el dato correspondiente y la adjuntamos a la fila
            $('<td>').text(datos.nombre).appendTo(fila);
            $('<td>').text(datos.apellido).appendTo(fila);
            $('<td>').text(datos.edad).appendTo(fila);
            $('<td>').text(datos.ciudad).appendTo(fila);
        }

        // --- FUNCIÓN 4: El Limpiador ---
        // Su única misión en la vida es vaciar el formulario
        function limpiarCampos() {
            // Usamos el método nativo de HTML reset() para vaciar todos los inputs de golpe
            $("#formulario")[0].reset();
        }

        function calcularDatosEdades() {
            let sumaEdades = 0;
            for (let i = 0; i < listaEdades.length; i++) {
                sumaEdades = sumaEdades + listaEdades[i];
            }

            let mediaEdades = 0;
            for (let i = 0; i < listaEdades.length; i++) {
                mediaEdades = mediaEdades + listaEdades[i] / listaEdades.length;
            }

            let maximaEdad=0;
            for (let i=0; i<listaEdades.length;i++){
                if (listaEdades[i]>maximaEdad){
                    maximaEdad=listaEdades[i];
                }
            }
            let minimaEdad=-1;
            for (let i=0; i<listaEdades.length;i++){
                if (listaEdades[i]<minimaEdad || minimaEdad === -1){
                    minimaEdad=listaEdades[i];
                }
            }
                console.log(`Suma de edades: ${sumaEdades}`);
                console.log(`Media de edades: ${mediaEdades}`);
                console.log(`Edad máxima: ${maximaEdad}`);
                console.log(`Edad mínima: ${minimaEdad}`);
        }



        // --- EL DISPARADOR ---
        // Cuando el documento esté listo, le decimos al botón que escuche el clic
        $(document).ready(function () {
            $("#btnEnviar").on("click", recogerDatos);
        });
    </script>
</body>

</html>
