<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Movimientos Bancarios - Jaime</title>

    <style>
        body {
            background-color: rgb(230, 245, 240);
        }
    </style>
</head>

<body>
    <!--Inputs-->
    <input type="text" id="inputConcepto" placeholder="Introduce un Nombre" />
    <input type="number" id="inputCantidad" placeholder="Cantidad" />

    <!--Radio para ingreso o gasto-->
    <label for="ingreso">Ingreso</label>
    <input type="radio" id="ingreso" name="tipoMovimiento" value="ingreso">
    <label for="gasto">Gasto</label>
    <input type="radio" id="gasto" name="tipoMovimiento" value="gasto">

    <!--Boton añadir-->
    <br>
    <button id="botonAnadir">Añadir</button>
    <br /><br />

    <!--Tabla-->
    <table border="3" id="tablaCompleta">
        <thead>
            <tr id="movimiento">
                <td id="tdConcepto">Concepto</td>
                <td id="tdIngreso">Ingreso</td>
                <td id="tdGasto">Gasto</td>
                <td id="tdSuma">Suma</td>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">

        </tbody>



    </table>



    <script>
       // 1. EL ESTADO: Nuestro array almacenará DATOS (objetos), no elementos HTML.
let almacenMovimientos = [];

// Capturamos los elementos principales del DOM
let inputConcepto = document.querySelector("#inputConcepto");
let inputCantidad = document.querySelector("#inputCantidad");
let botonAnadir = document.querySelector("#botonAnadir");
let bodyTabla = document.querySelector("#cuerpoTabla");

// Evento al hacer click en "Añadir"
botonAnadir.addEventListener("click", function () {
    let valorConcepto = inputConcepto.value;
    let textoCantidad = inputCantidad.value; // Lo cogemos como texto primero
    
    // Averiguamos qué radio button está seleccionado usando un selector CSS
    let radioSeleccionado = document.querySelector('input[name="tipoMovimiento"]:checked');

    // VALIDACIÓN: Comprobamos si falta texto, falta cantidad, o no hay radio
    if (valorConcepto === "" || textoCantidad === "" || radioSeleccionado === null) {
        alert("Error: Por favor, rellena todos los campos y selecciona Ingreso o Gasto.");
        return; // Cortamos la ejecución
    }

    // Si pasamos la validación, ya podemos convertir la cantidad a número
    let valorCantidad = Number(textoCantidad);

    // 2. CREAMOS EL OBJETO DE DATOS
    let nuevoMovimiento = {
        concepto: valorConcepto,
        cantidad: valorCantidad,
        tipo: radioSeleccionado.value // Será "ingreso" o "gasto"
    };

    // 3. AÑADIMOS EL DATO AL ARRAY
    almacenMovimientos.push(nuevoMovimiento);

    // Limpiamos los inputs para el siguiente movimiento
    inputConcepto.value = "";
    inputCantidad.value = "";
    radioSeleccionado.checked = false;

    // 4. ACTUALIZAMOS LA INTERFAZ VISUAL
    renderizarTabla();
});

// Crea una fila <tr> completa para un movimiento dado
function crearFilaMovimiento(movimiento, saldo, index) {
    let tdConcepto = document.createElement("td");
    tdConcepto.textContent = movimiento.concepto;

    let tdIngreso = document.createElement("td");
    if (movimiento.tipo === "ingreso") {
        tdIngreso.textContent = movimiento.cantidad;
    }

    let tdGasto = document.createElement("td");
    if (movimiento.tipo === "gasto") {
        tdGasto.textContent = movimiento.cantidad;
    }

    let tdSuma = document.createElement("td");
    tdSuma.textContent = saldo;
    tdSuma.style.fontWeight = "bold";
    
    // Estilos del saldo
    if (saldo < 0) {
        tdSuma.style.color = "red";
    } else {
        tdSuma.style.color = "black";
    }

    let botonEliminar = document.createElement("button");
    botonEliminar.textContent = "Eliminar";
    botonEliminar.style.color = "red";
    
    // Lógica para eliminar SIN splice
    botonEliminar.addEventListener("click", function () {
        let nuevoArray = []; // Creamos un array temporal
        
        // Recorremos el almacén de movimientos
        for (let i = 0; i < almacenMovimientos.length; i++) {
            // Si la posición 'i' NO es la que queremos borrar, la guardamos
            if (i !== index) {
                nuevoArray.push(almacenMovimientos[i]);
            }
        }
        
        // Reemplazamos el array viejo por el nuevo (que ya no tiene el borrado)
        almacenMovimientos = nuevoArray;
        
        // Volvemos a dibujar la tabla
        renderizarTabla();
    });

    let tdAcciones = document.createElement("td");
    tdAcciones.appendChild(botonEliminar);

    let tr = document.createElement("tr");
    tr.appendChild(tdConcepto);
    tr.appendChild(tdIngreso);
    tr.appendChild(tdGasto);
    tr.appendChild(tdSuma);
    tr.appendChild(tdAcciones);
    
    return tr;
}

// Dibuja la tabla entera leyendo el array de datos
function renderizarTabla() {
    bodyTabla.innerHTML = "";
    let saldoAcumulado = 0;

    // Usamos un bucle for clásico para recorrer los datos
    for (let i = 0; i < almacenMovimientos.length; i++) {
        let movimientoActual = almacenMovimientos[i];

        // Calculamos el saldo paso a paso
        if (movimientoActual.tipo === "ingreso") {
            saldoAcumulado = saldoAcumulado + movimientoActual.cantidad;
        } else {
            saldoAcumulado = saldoAcumulado - movimientoActual.cantidad;
        }

        // Llamamos a la función que crea el <tr> pasándole la posición 'i'
        let filaHtml = crearFilaMovimiento(movimientoActual, saldoAcumulado, i);
        bodyTabla.appendChild(filaHtml);
    }
}
    </script>
</body>

</html>
